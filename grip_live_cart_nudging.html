<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>그립 라이브커머스 - 넛징 UI 8 Cases</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;background:#111;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;display:flex;flex-direction:column;align-items:center;padding:16px 0}

/* ── 애니메이션 ── */
@keyframes floatUp{0%{opacity:0;transform:translateY(8px) scale(.85)}12%{opacity:1;transform:translateY(0) scale(1)}65%{opacity:1;transform:translateY(-48px) scale(1)}100%{opacity:0;transform:translateY(-72px) scale(.6)}}
@keyframes arrowRise{0%{opacity:0;transform:translateY(8px) scale(.75)}10%{opacity:1;transform:translateY(0) scale(1.06)}14%{transform:translateY(0) scale(1)}62%{opacity:1;transform:translateY(-52px) scale(1)}100%{opacity:0;transform:translateY(-80px) scale(.65)}}
@keyframes miniArrow{0%{opacity:0;transform:translateY(4px)}14%{opacity:.35;transform:translateY(0)}68%{opacity:.35;transform:translateY(-32px)}100%{opacity:0;transform:translateY(-46px)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}
@keyframes fadeUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-2px)}40%{transform:translateX(2px)}60%{transform:translateX(-1.5px)}80%{transform:translateX(1.5px)}}
@keyframes bounce{0%{transform:translateY(3px);opacity:0}50%{transform:translateY(-1.5px);opacity:1}100%{transform:translateY(0);opacity:1}}
@keyframes heartFloat{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-60px) scale(.5)}}
@keyframes urgentGlow{0%,100%{box-shadow:0 0 0 0 rgba(255,0,0,0),0 2px 12px rgba(0,0,0,.12)}50%{box-shadow:0 0 0 3px rgba(255,0,0,.25),0 2px 16px rgba(255,0,0,.15)}}
@keyframes urgentShake{0%,100%{transform:translateX(0)}10%{transform:translateX(-1.5px)}20%{transform:translateX(1.5px)}30%{transform:translateX(-1px)}40%{transform:translateX(1px)}50%{transform:translateX(0)}}
@keyframes countdownPop{0%{transform:scale(1)}15%{transform:scale(1.25)}30%{transform:scale(1)}}
@keyframes urgentSlide{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes fireFlicker{0%{transform:translateY(0) scale(1);opacity:.9}50%{transform:translateY(-2px) scale(1.15);opacity:1}100%{transform:translateY(0) scale(1);opacity:.9}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes popIn{0%{transform:scale(0);opacity:0}60%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
@keyframes hotPulse{0%,100%{box-shadow:0 0 0 0 rgba(255,77,79,.15)}50%{box-shadow:0 0 0 3px rgba(255,77,79,.06)}}
@keyframes cartBounce{0%{transform:translateY(0)}50%{transform:translateY(-2px)}100%{transform:translateY(0)}}
@keyframes rankSlide{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes cartFloat{0%{opacity:0;transform:translateY(6px) scale(.8)}10%{opacity:1;transform:translateY(0) scale(1)}60%{opacity:1;transform:translateY(-44px) scale(1)}100%{opacity:0;transform:translateY(-68px) scale(.6)}}
@keyframes cartWiggle{0%,100%{transform:rotate(0)}25%{transform:rotate(-8deg)}75%{transform:rotate(8deg)}}
@keyframes progressGrow{from{width:0}to{width:var(--target-w)}}
@keyframes nudgePop{0%{transform:scale(.9);opacity:0}50%{transform:scale(1.05)}100%{transform:scale(1);opacity:1}}
@keyframes cartRing{0%{transform:scale(1)}20%{transform:scale(1.15)}40%{transform:scale(1)}60%{transform:scale(1.1)}100%{transform:scale(1)}}

/* ── 레이아웃 ── */
.header{width:100%;max-width:460px;padding:0 16px;margin-bottom:10px}
.header h1{font-size:18px;font-weight:800;color:#fff;letter-spacing:-.4px;margin-bottom:2px}
.header p{font-size:12px;color:#666}
.cat-label{width:100%;max-width:460px;padding:0 16px;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.cat-label span{font-size:11px;font-weight:700;padding:3px 8px;border-radius:6px}
.cat-label .cat-buy{background:#FF4D4F;color:#fff}
.cat-label .cat-cart{background:#FF6B00;color:#fff}
.cat-label em{font-size:11px;color:#666;font-style:normal}
.tabs{display:flex;gap:5px;margin-bottom:10px;padding:0 16px;width:100%;max-width:460px;overflow-x:auto}
.tab{background:#1c1c1c;color:#888;border:1px solid #2a2a2a;border-radius:16px;padding:5px 12px;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .2s;flex-shrink:0}
.tab.active-red{background:#FF4D4F;color:#fff;border-color:#FF4D4F}
.tab.active-orange{background:#FF6B00;color:#fff;border-color:#FF6B00}

/* ── 폰 프레임 ── */
.phone{width:440px;height:720px;border-radius:24px;background:#000;position:relative;overflow:visible;box-shadow:0 8px 40px rgba(0,0,0,.6);border:2px solid #222}
.phone-bg{position:absolute;inset:0;border-radius:22px;overflow:hidden;background:linear-gradient(170deg,#2a3a52 0%,#1a2438 40%,#141c2d 100%)}

/* ── 설명 ── */
.desc-wrap{width:100%;max-width:440px;margin-top:16px;padding:0 4px}
.desc-card{background:#1a1a1a;border-radius:14px;padding:14px;border:1px solid #262626}
.desc-title{font-size:14px;font-weight:700;color:#fff;margin-bottom:4px}
.desc-sub{font-size:12px;color:#888;line-height:1.5;margin-bottom:10px}
.desc-detail{background:#111;border-radius:8px;padding:10px 12px;font-size:11px;color:#aaa;line-height:1.7}

/* ── 스토어 팝업 ── */
.store-overlay{position:absolute;inset:0;z-index:50;border-radius:22px;overflow:hidden;display:none}
.store-overlay.open{display:block}
.store-dim{position:absolute;inset:0;background:rgba(0,0,0,.55);animation:fadeIn .2s ease-out}
.store-sheet{position:absolute;bottom:0;left:0;right:0;max-height:88%;background:#fff;border-radius:16px 16px 0 0;animation:slideUp .35s cubic-bezier(.32,.72,.37,1.1);display:flex;flex-direction:column}
.store-handle{width:36px;height:4px;border-radius:2px;background:#ddd;margin:10px auto 0}
.store-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px 0}
.store-htabs{display:flex;gap:0}
.store-htab{padding:8px 0;margin-right:16px;font-size:13px;font-weight:700;color:#ccc;cursor:pointer;border:none;background:none;position:relative}
.store-htab.active{color:#111}
.store-htab.active::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2.5px;background:#FF4D4F;border-radius:1px}
.store-htab .cnt{font-size:12px;font-weight:600;color:#FF4D4F;margin-left:3px}
.store-close{width:28px;height:28px;border-radius:50%;background:#f0f0f0;display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer;border:none;color:#666}
.store-list{flex:1;overflow-y:auto;padding:0}
.si{display:flex;align-items:flex-start;gap:10px;padding:12px 16px;border-bottom:1px solid #f5f5f5;position:relative;transition:background .15s}
.si:last-child{border-bottom:none}
.si-thumb{width:72px;height:72px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.si-thumb-badge{position:absolute;top:0;left:0;background:#FF4D4F;color:#fff;font-size:8px;font-weight:700;padding:2px 5px;border-radius:0 0 6px 0}
.si-info{flex:1;min-width:0;padding-top:2px}
.si-name{font-size:12px;color:#333;line-height:1.4;margin-bottom:3px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.si-prices{display:flex;align-items:center;gap:5px;margin-bottom:3px}
.si-orig{font-size:10px;color:#bbb;text-decoration:line-through}
.si-sale{font-size:14px;font-weight:800;color:#111}
.si-live{display:inline-block;background:#FFE8EC;color:#FF4D6A;font-size:8px;font-weight:700;padding:1px 4px;border-radius:3px;margin-left:3px}
.si-badges{display:flex;flex-wrap:wrap;gap:3px;margin-top:3px}
.si-buy{background:none;border:1px solid #eee;border-radius:8px;padding:6px 10px;font-size:11px;font-weight:700;color:#FF4D4F;cursor:pointer;flex-shrink:0;align-self:center}
.si.hot-row{background:#FFFAFA}
.si.cart-row{background:#FFFCF5}
</style>
</head>

<script>
// ═══ 케이스 정의 ═══
const BUY_CASES = [
  {id:"c1",label:"Case 1",title:"실시간 구매 카운트",desc:"카드 내 N명 구매중 뱃지 + 우측 숫자 버블 UP",

  {id:"c2",label:"Case 2",title:"구매 급증 알림",desc:"임계값 돌파 시 인기폭발 강조 + 우측 🔥 파티클",
   detail:'<strong style="color:#FF6B00">카드 내부:</strong> 30명 돌파 시 그라데이션 + 흔들림<br><strong style="color:#FF6B00">카드 우측:</strong> 🔥 인기급상승 버블<br><strong style="color:#888">효과:</strong> 임계값 기반 FOMO → 구매 집중 타이밍'},
  {id:"c3",label:"Case 3",title:"최근 구매자 흐름",desc:"OO님 방금 구매 롤링 + 우측 프로필 버블",

  {id:"c4",label:"Case 4",title:"재고 연동 긴급감",desc:"잔여 프로그레스바 + 우측 품절임박 버블",

  {id:"c5",label:"Case 5",title:"화살표 구매 UP",desc:"↑ 화살표 + N명 구매 태그 연속 상승 애니메이션",

];

const CART_CASES = [
  {id:"ca",label:"Case A",title:"실시간 장바구니 담기 동조",desc:"N명이 장바구니에 담는중 + 우측 🛒 담기 버블 떠오름",

function buildTabs(containerId, cases, colorClass) {
  const el = document.getElementById(containerId);
  cases.forEach(c => {
    const btn = document.createElement("button");
    btn.className = "tab" + (c.id === active ? ` ${colorClass}` : "");
    btn.textContent = c.label;
    btn.dataset.id = c.id;
    btn.onclick = () => { active = c.id; count=14; stock=18; cartCount=47; updateAllTabs(); render(); };
    el.appendChild(btn);
  });
}
buildTabs("tabs-buy", BUY_CASES, "active-red");

function updateAllTabs() {
  document.querySelectorAll("#tabs-buy .tab").forEach(b => {

    if(isTopSold) badges+=`<span style="display:inline-flex;align-items:center;gap:2px;background:#FFF0F0;color:#FF4D4F;font-size:9px;font-weight:700;padding:2px 6px;border-radius:6px"><span style="width:4px;height:4px;border-radius:50%;background:#FF4D4F;animation:pulse 1s infinite"></span>🔥 ${p.sold}명 구매</span>`;

    // 장바구니 넛징 뱃지 (케이스별 분기)
    if(isTopCart) {
      if(active==="ca") badges+=`<span style="display:inline-flex;align-items:center;gap:2px;background:#FFF5EB;color:#FF6B00;font-size:9px;font-weight:700;padding:2px 6px;border-radius:6px;animation:cartBounce 2s infinite ${i*.2}s"><span style="animation:cartWiggle 1.5s infinite">🛒</span> ${p.cart}명 담는중</span>`;
      else if(active==="cb") {
        const rate=Math.round((p.sold/p.cart)*100);
        badges+=`<span style="display:inline-flex;align-items:center;gap:2px;background:#FFF5EB;color:#FF6B00;font-size:9px;font-weight:700;padding:2px 6px;border-radius:6px;animation:pulse 1.5s infinite">🛒 ${p.cart}명 담음 → 구매 ${rate}%</span>`;
      }
      else if(active==="cc") badges+=`<span style="display:inline-flex;align-items:center;gap:2px;background:linear-gradient(90deg,#FFF5EB,#FFE8D6);color:#FF6B00;font-size:9px;font-weight:700;padding:2px 6px;border-radius:6px;animation:cartBounce 2s infinite">📈 담기 급증</span>`;
      else badges+=`<span style="display:inline-flex;align-items:center;gap:2px;background:#FFF5EB;color:#FF6B00;font-size:9px;font-weight:700;padding:2px 6px;border-radius:6px;animation:cartBounce 2s infinite ${i*.2}s">🛒 ${p.cart}명 담는중</span>`;
    }
    if(isCrit) badges+=`<span style="display:inline-flex;align-items:center;gap:2px;background:#FEF2F2;color:#DC2626;font-size:9px;font-weight:700;padding:2px 6px;border-radius:6px;animation:pulse .8s infinite">⚡ ${p.stock}개 남음</span>`;

    // 장바구니 전환바 (Case B 전용, 스토어에서도 TOP3에 표시)
    let cartBar = "";
    if(active==="cb" && isTopCart) {
      const rate=Math.round((p.sold/p.cart)*100);
      cartBar=`<div style="width:100%;height:3px;border-radius:1.5px;background:#FFE0C2;overflow:hidden;margin-top:3px;position:relative"><div style="width:${rate}%;height:100%;border-radius:1.5px;background:linear-gradient(90deg,#FF6B00,#FF4D4F)"></div></div><div style="font-size:8px;color:#FF6B00;margin-top:1px">${p.cart-p.sold}명 아직 미구매</div>`;
    }

    let stockBar="";
    if(isCrit){const pct=Math.max(0,(p.stock/50)*100);stockBar=`<div style="width:100%;height:2.5px;border-radius:1.5px;background:#f0f0f0;overflow:hidden;margin-top:3px"><div style="width:${pct}%;height:100%;border-radius:1.5px;background:linear-gradient(90deg,#DC2626,#FF4D4F);animation:pulse 1s infinite"></div></div>`;}

    let thumbBadge="";
    if(isTopSold&&sr[p.name]===1) thumbBadge=`<div class="si-thumb-badge">🔥 1위</div>`;
    else if(isCartCase&&isTopCart&&cr[p.name]===1) thumbBadge=`<div class="si-thumb-badge" style="background:#FF6B00">🛒 1위</div>`;

    html+=`<div class="${cls}" style="animation:rankSlide .25s ease-out ${i*.04}s both">
      <div class="si-thumb" style="background:${p.bg}">${thumbBadge}<span style="font-size:30px">${p.emoji}</span></div>
      <div class="si-info">
        <div class="si-name">${p.name}</div>
        <div class="si-prices">${p.orig?`<span class="si-orig">${p.orig}원</span>`:""}<span class="si-sale">${p.price}원</span><span class="si-live">라이브가</span></div>
        ${p.ship?`<div style="font-size:9px;color:#999;margin-bottom:2px">🚚 무료배송</div>`:""}
        ${badges?`<div class="si-badges">${badges}</div>`:""}
        ${cartBar}${stockBar}
      </div>
      <button class="si-buy">🛒 구매</button>
    </div>`;
  });
  list.innerHTML=html;
}
</script>
</body>
</html>
